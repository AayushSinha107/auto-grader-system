<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Auto-Grader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-lg w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">📝 AI Auto-Grader</h1>
            <p class="text-gray-500 mt-2">Upload your text or PDF files to generate a report card.</p>
        </div>

        <form id="gradeForm" class="space-y-6">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Question Paper (.txt, .pdf)</label>
                <input type="file" name="question_paper" accept=".txt,.pdf" required
                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Textbook / Syllabus (.txt, .pdf)</label>
                <input type="file" name="textbook" accept=".txt,.pdf" required
                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Student Answers (.txt, .pdf)</label>
                <input type="file" name="student_answers" accept=".txt,.pdf" required
                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-md hover:bg-blue-700 transition duration-300">
                Generate Report Card
            </button>
            
            <p id="loadingText" class="text-center text-blue-600 font-medium hidden mt-4 animate-pulse">
                Agents are evaluating... Please wait.
            </p>
        </form>
    </div>

    <script>
        document.getElementById('gradeForm').addEventListener('submit', async function(event) {
            // 1. Stop the browser from doing its default form submission
            event.preventDefault();

            // 2. Hide the button and show the loading text
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loadingText').style.display = 'block';

            // 3. Package up the uploaded files
            const formData = new FormData(this);

            try {
                // 4. Send the files to our FastAPI backend silently in the background
                const response = await fetch('/grade', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // 5. Convert the response into a downloadable file (a Blob)
                    const blob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(blob);
                    
                    // Create an invisible link, click it to download the PDF, then remove it
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = "Graded_Report.pdf";
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    
                    // Clean up the memory
                    window.URL.revokeObjectURL(downloadUrl);
                } else {
                    alert("Oops! The AI agents ran into an error. Please try again.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Something went wrong connecting to the server.");
            } finally {
                // 6. Reset the UI back to normal, regardless of success or failure!
                document.getElementById('submitBtn').style.display = 'block';
                document.getElementById('loadingText').style.display = 'none';
                
                // Optional: clear the file inputs so it's ready for the next student
                this.reset(); 
            }
        });
    </script>
</body>
</html>
